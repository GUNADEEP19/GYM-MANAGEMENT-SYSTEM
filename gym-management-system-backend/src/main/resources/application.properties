# noinspection SpringBootApplicationProperties
spring.application.name=gym-management-system-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gymdb}
spring.datasource.username=${DB_USERNAME:gymuser}
# DB password is read from environment variable to avoid committing secrets
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key-change-this}
app.jwt.expiration-ms=86400000

# Predefined Admin (seeded at startup if missing)
app.admin.name=${ADMIN_NAME:Super Admin}
app.admin.email=${ADMIN_EMAIL:admin@gym.com}
app.admin.phone=${ADMIN_PHONE:9999999999}
app.admin.password=${ADMIN_PASSWORD:admin123}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
